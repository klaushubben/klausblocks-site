<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Runners Standing Still Screen Viewer</title>
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        background: #000;
        overflow: hidden;
      }

      body {
        position: fixed;
        inset: 0;
      }

      canvas {
        display: block;
      }

      body[data-view="screen"] canvas {
        width: 100vw !important;
        height: 100vh !important;
        max-width: none !important;
        max-height: none !important;
        object-fit: fill !important;
      }

      body[data-view="object"] {
        display: grid;
        place-items: center;
      }

      body[data-view="object"] canvas {
        width: 100vw !important;
        height: auto !important;
        max-width: 100vw !important;
        max-height: 100vh !important;
        object-fit: contain !important;
      }

      .viewer-meta {
        position: fixed;
        left: 1rem;
        bottom: 1rem;
        z-index: 2;
        max-width: min(42rem, calc(100vw - 2rem));
        color: rgba(247, 247, 242, 0.72);
        font: 12px/1.35 Arial, Helvetica, sans-serif;
        pointer-events: none;
      }

      .viewer-controls {
        position: fixed;
        top: 1rem;
        right: 1rem;
        z-index: 3;
        display: flex;
        gap: 0.5rem;
      }

      .viewer-controls button,
      .viewer-controls a {
        padding: 0.75rem 0.85rem;
        border: 1px solid rgba(247, 247, 242, 0.5);
        color: rgb(247, 247, 242);
        background: rgba(0, 0, 0, 0.25);
        font: 12px/1 Arial, Helvetica, sans-serif;
        cursor: pointer;
        text-decoration: none;
      }

      .viewer-controls button:hover,
      .viewer-controls button:focus-visible,
      .viewer-controls a:hover,
      .viewer-controls a:focus-visible {
        border-color: rgb(247, 247, 242);
        outline: 0;
      }

      .viewer-controls [aria-current="true"] {
        background: rgba(247, 247, 242, 0.18);
      }
    </style>
  </head>
  <body>
    <canvas></canvas>
    <div class="viewer-controls">
      <a href="" data-view-link="screen">screen</a>
      <a href="" data-view-link="object">object</a>
      <button type="button" data-redraw>redraw</button>
      <button type="button" data-new-hash>new hash</button>
    </div>
    <div class="viewer-meta" data-viewer-meta></div>
    <script>
      const BASE_WIDTH = 4032;
      const BASE_HEIGHT = 2352;
      let currentHash = readHashFromUrl() || randomHash();
      let currentView = readViewFromUrl();

      function readHashFromUrl() {
        const hash = new URLSearchParams(window.location.search).get("hash");
        return /^0x[0-9a-fA-F]{64}$/.test(hash || "") ? hash : "";
      }

      function readViewFromUrl() {
        const view = new URLSearchParams(window.location.search).get("view");
        return view === "object" ? "object" : "screen";
      }

      function navigateWithHash(hash) {
        const next = new URL(window.location.href);
        next.searchParams.set("hash", hash);
        next.searchParams.set("view", currentView);
        next.searchParams.set("redraw", String(Date.now()));
        window.location.replace(next);
      }

      function viewUrl(view) {
        const next = new URL(window.location.href);
        next.searchParams.set("hash", currentHash);
        next.searchParams.set("view", view);
        next.searchParams.delete("redraw");
        return next;
      }

      function syncViewControls() {
        document.body.dataset.view = currentView;
        document.querySelectorAll("[data-view-link]").forEach((link) => {
          const isCurrent = link.dataset.viewLink === currentView;
          link.href = viewUrl(link.dataset.viewLink);
          link.setAttribute("aria-current", String(isCurrent));
        });
      }

      function randomHash() {
        const bytes = new Uint8Array(32);
        crypto.getRandomValues(bytes);
        return `0x${Array.from(bytes, (byte) => byte.toString(16).padStart(2, "0")).join("")}`;
      }

      function viewportSize() {
        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        return {
          width: Math.max(1, Math.round(window.innerWidth * dpr)),
          height: Math.max(1, Math.round(window.innerHeight * dpr)),
          dpr,
        };
      }

      function patchRenderer(script, width, height, view) {
        if (view === "object") return script;

        const noiseScaleX = BASE_WIDTH / width;
        const noiseScaleY = BASE_HEIGHT / height;

        return script
          .replace(
            /width:4032,height:2352,imageWidth:3840,imageHeight:2160,matte:96,matteColor:"#ffffff",textureWidth:3840,textureHeight:2160/,
            `width:${width},height:${height},imageWidth:${width},imageHeight:${height},matte:0,matteColor:"#000000",textureWidth:${width},textureHeight:${height}`,
          )
          .replace(
            /noiseStepX:e\.random_num\(28e-5,7e-4\),noiseStepY:N,/,
            `noiseStepX:e.random_num(28e-5,7e-4)*${noiseScaleX},noiseStepY:N*${noiseScaleY},`,
          )
          .replace(
            /canvas\.style\.width="100vw",canvas\.style\.height="auto",canvas\.style\.maxHeight="100vh",canvas\.style\.objectFit="contain"/,
            `canvas.style.width="100vw",canvas.style.height="100vh",canvas.style.maxHeight="none",canvas.style.objectFit="fill"`,
          );
      }

      async function render(hash = currentHash) {
        currentHash = hash;
        currentView = readViewFromUrl();
        syncViewControls();

        const { width, height, dpr } = viewportSize();
        window.renderInput = { hash, tokenId: "screen", contractAddress: "", chainId: "", minter: "" };
        window.tokenData = window.renderInput;
        document.querySelector("[data-viewer-meta]").textContent = `${hash} | ${currentView} | ${width}x${height} @ ${dpr}x`;

        const response = await fetch("./sketch.runners-standing-still.min.js", { cache: "no-store" });
        if (!response.ok) throw new Error("Renderer script failed to load.");

        const script = patchRenderer(await response.text(), width, height, currentView);
        const node = document.createElement("script");
        node.textContent = script;
        document.body.appendChild(node);
      }

      document.querySelector("[data-redraw]").addEventListener("click", () => {
        navigateWithHash(currentHash);
      });

      document.querySelector("[data-new-hash]").addEventListener("click", () => {
        navigateWithHash(randomHash());
      });

      function showError(error) {
        document.querySelector("[data-viewer-meta]").textContent = error.message;
        console.error(error);
      }

      render(currentHash).catch(showError);
    </script>
  </body>
</html>
